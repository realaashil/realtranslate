name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            make-targets: '@electron-forge/maker-zip'
          - os: windows-latest
            platform: win32
            make-targets: '@electron-forge/maker-squirrel'
          - os: ubuntu-latest
            platform: linux
            make-targets: '@electron-forge/maker-deb'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install RPM tools (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build Electron app
        run: npx electron-forge make --targets "$MAKE_TARGETS"
        working-directory: apps/desktop
        env:
          MAKE_TARGETS: ${{ matrix.make-targets }}
          NODE_ENV: production
          TOKEN_SERVICE_URL: ${{ vars.TOKEN_SERVICE_URL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: apps/desktop/out/make/**/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
